<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Romush</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
        }

        h1 {
            font-family: 'Aptos', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 100pt;
            color: #333;
            margin: 0;
            display: flex;
            align-items: center;
        }

        /* The Typewriter Cursor */
        h1::after {
            content: "";
            display: inline-block;
            width: 12px; /* Thickness of the cursor */
            height: 110pt; /* Slightly taller than font for aesthetics */
            background-color: #333;
            margin-left: 10px;
            animation: blink 0.8s step-end infinite;
        }

        /* Blinking Animation */
        @keyframes blink {
            from, to { background-color: transparent; }
            50% { background-color: #333; }
        }
    </style>
</head>
<body>

    <h1>hello Romush!</h1>

</body>
</html>
