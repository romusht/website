<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Romush!</title>
    <style>
        /* Resets and Pure White Background */
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* Updated to pure white */
            font-family: 'Aptos', 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden; 
        }

        /* Layout Container */
        .main-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Video Styling - 80% Size Increase */
        .corner-video {
            position: absolute;
            bottom: 0;
            width: 630px; 
            height: auto;
            /* Blends the video background into the white page */
            mix-blend-mode: multiply; 
            z-index: 1;
        }

        .left-side {
            left: -30px;
        }

        .right-side {
            right: -30px;
        }

        /* Centered Text Container */
        .container {
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }

        h1 {
            font-size: 10vmin; 
            color: #1a1a1a;
            margin: 0;
            white-space: nowrap;
            display: flex;
            align-items: center;
            overflow: hidden;
            
            /* Logic: "hello Romush!" = 12 characters */
            width: 12ch; 
            
            animation: typing 2.5s steps(12, end);
        }

        /* The Blue Typewriter Cursor */
        h1::after {
            content: "";
            display: inline-block;
            width: 0.15em; 
            height: 1em;
            background-color: #007bff; 
            margin-left: 0.1em;
            animation: blink 1s step-end infinite;
        }

        /* Animations */
        @keyframes typing {
            from { width: 0; }
            to { width: 12ch; }
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Responsive scaling */
        @media (max-width: 1200px) {
            .corner-video { width: 450px; }
        }

        @media (max-width: 768px) {
            .corner-video { width: 300px; }
            h1 { font-size: 12vw; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <video class="corner-video left-side" autoplay loop muted playsinline>
            <source src="left side.mp4" type="video/mp4">
        </video>

        <div class="container">
            <h1>hello Romush!</h1>
        </div>

        <video class="corner-video right-side" autoplay loop muted playsinline>
            <source src="right side.mp4" type="video/mp4">
        </video>

    </div>

</body>
</html>
