<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Romush</title>
    <style>
        /* Resets and centering the container */
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            overflow: hidden; /* Prevents scrollbars if the cursor bounces */
        }

        .container {
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-family: 'Aptos', 'Segoe UI', system-ui, -apple-system, sans-serif;
            /* Dynamic Font Size: 10% of the smaller screen dimension */
            font-size: 10vmin; 
            color: #1a1a1a;
            margin: 0;
            white-space: nowrap;
            display: flex;
            align-items: center;
        }

        /* The Typewriter Cursor */
        h1::after {
            content: "";
            display: inline-block;
            /* Responsive cursor width and height */
            width: 0.15em; 
            height: 1em;
            background-color: #1a1a1a; /* A nice blue accent */
            margin-left: 0.1em;
            animation: blink 1s step-end infinite;
        }

        /* Smooth Blinking Animation */
        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Mobile specific adjustment for very small screens */
        @media (max-width: 480px) {
            h1 {
                font-size: 12vw; /* Use slightly more width on narrow phones */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>hello Romush</h1>
    </div>

</body>
</html>
