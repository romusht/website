<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Romush</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            font-family: 'Aptos', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* Container to stack text and button vertically */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px; /* Space between text and button */
            text-align: center;
        }

        h1 {
            font-size: 8vmin; 
            color: #1a1a1a;
            margin: 0;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        /* The Typewriter Cursor */
        h1::after {
            content: "";
            display: inline-block;
            width: 0.12em; 
            height: 1em;
            background-color: #007bff;
            margin-left: 0.1em;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Button Styling */
        .water-btn {
            display: inline-block;
            padding: 15px 35px;
            font-size: 1.5rem;
            font-weight: 500;
            color: white;
            background-color: #007bff;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        .water-btn:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
        }

        .water-btn:active {
            transform: translateY(0);
        }

        /* Responsive adjustments for phone */
        @media (max-width: 480px) {
            h1 { font-size: 12vw; }
            .water-btn { font-size: 1.2rem; padding: 12px 28px; }
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <h1>hello Romush</h1>
        <a href="https://ai.studio/apps/af847a6f-526b-4777-971b-348e14d9b1ca?fullscreenApplet=true">
            Drink Water
        </a>
    </div>

</body>
</html>
